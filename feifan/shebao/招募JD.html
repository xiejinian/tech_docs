<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州社保公积金项目 · 招募JD</title>
<style>
  :root {
    --bg: #FAF9F6;
    --bg-card: #FFFFFF;
    --ink: #1F1B16;
    --ink-soft: #6B6358;
    --line: #E8E3D9;
    --accent: #D97757;
    --accent-soft: #FBEEE7;
    --teal: #2A9D8F;
    --teal-soft: #E8F4F2;
    --gold: #BA8B3E;
    --gold-soft: #F7EFDF;
    --slate: #5B6470;
    --slate-soft: #EAEDF0;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 980px; margin: 0 auto; padding: 64px 28px 100px; }

  /* HEADER */
  header { margin-bottom: 48px; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.12em; color: var(--accent);
    font-weight: 600; margin-bottom: 18px; text-transform: uppercase;
  }
  .eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: inline-block;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.7);} }

  h1 {
    font-family: Georgia, 'Songti SC', serif;
    font-size: 40px; font-weight: 600; letter-spacing: -0.01em;
    line-height: 1.15; margin-bottom: 14px;
  }

  .subhead { font-size: 16px; color: var(--ink-soft); max-width: 600px; }

  /* PROJECT FACTS BAR */
  .facts-bar {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--line);
  }
  .fact-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 99px;
    background: var(--bg-card); border: 1px solid var(--line);
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  }
  .fact-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* SECTION */
  section { margin-bottom: 40px; }
  .section-num { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .05em; }
  h2 { font-family: Georgia, 'Songti SC', serif; font-size: 22px; font-weight: 600; margin: 6px 0 18px; }

  /* ROLE NAV */
  .role-nav {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--line);
  }
  .nav-pill {
    padding: 9px 16px; border-radius: 99px;
    background: var(--bg-card); border: 1px solid var(--line);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .2s; display: flex; align-items: center; gap: 7px;
    text-decoration: none; color: var(--ink);
  }
  .nav-pill:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .nav-pill .nav-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* JD CARD */
  .jd-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    margin-bottom: 24px;
    overflow: hidden;
    opacity: 0; transform: translateY(16px);
    transition: opacity .6s ease, transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .jd-card.visible { opacity: 1; transform: translateY(0); }

  .jd-header {
    padding: 26px 30px;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid var(--line);
  }

  .jd-header-left { display: flex; gap: 16px; align-items: flex-start; }

  .jd-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .jd-title-group .jd-cat {
    font-size: 11px; text-transform: uppercase; letter-spacing: .07em;
    font-weight: 700; margin-bottom: 4px;
  }
  .jd-title-group h3 {
    font-family: Georgia, 'Songti SC', serif;
    font-size: 20px; font-weight: 600;
  }
  .jd-title-group .jd-oneliner {
    font-size: 13px; color: var(--ink-soft); margin-top: 4px;
  }

  .jd-comp {
    text-align: right; flex-shrink: 0;
  }
  .jd-comp .comp-pct { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .jd-comp .comp-amt { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
  .jd-comp .comp-tag {
    display: inline-block; margin-top: 6px;
    font-size: 10px; padding: 2px 8px; border-radius: 99px;
    background: var(--slate-soft); color: var(--slate); font-weight: 600;
  }

  .jd-body { padding: 26px 30px; }

  .jd-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
  }
  @media (max-width: 720px) { .jd-grid { grid-template-columns: 1fr; } }

  .jd-block h4 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--ink-soft); font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  .jd-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .jd-list li {
    font-size: 13.5px; padding-left: 18px; position: relative; line-height: 1.55;
  }
  .jd-list li::before {
    content: '—'; position: absolute; left: 0; color: var(--ink-soft); font-size: 12px;
  }
  .jd-list.musthave li::before { content: '✓'; color: var(--teal); font-weight: 700; font-size: 11px; top: 2px; }
  .jd-list.nicetohave li::before { content: '+'; color: var(--gold); font-weight: 700; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
  .stack-tag {
    font-size: 11.5px; padding: 4px 10px; border-radius: 7px;
    background: var(--slate-soft); color: var(--slate); font-weight: 600;
    font-family: var(--mono);
  }

  .jd-footer-row {
    margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--line);
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .footer-meta { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-soft); }
  .footer-meta strong { color: var(--ink); font-weight: 700; }

  /* per-role colors */
  .jd-card[data-role="partner"] .jd-icon { background: var(--accent-soft); color: var(--accent); }
  .jd-card[data-role="partner"] .jd-cat { color: var(--accent); }
  .jd-card[data-role="pm"] .jd-icon,
  .jd-card[data-role="tech-lead"] .jd-icon { background: var(--gold-soft); color: var(--gold); }
  .jd-card[data-role="pm"] .jd-cat,
  .jd-card[data-role="tech-lead"] .jd-cat { color: var(--gold); }
  .jd-card[data-role="frontend"] .jd-icon,
  .jd-card[data-role="backend"] .jd-icon,
  .jd-card[data-role="qa"] .jd-icon,
  .jd-card[data-role="ops"] .jd-icon { background: var(--teal-soft); color: var(--teal); }
  .jd-card[data-role="frontend"] .jd-cat,
  .jd-card[data-role="backend"] .jd-cat,
  .jd-card[data-role="qa"] .jd-cat,
  .jd-card[data-role="ops"] .jd-cat { color: var(--teal); }

  /* CRITICAL NOTE BANNER */
  .critical-banner {
    background: var(--gold-soft);
    border: 1px solid rgba(186,139,62,0.3);
    border-radius: 14px;
    padding: 18px 22px;
    display: flex; gap: 12px;
    margin-bottom: 32px;
    font-size: 13.5px; color: #6B4E1E;
  }
  .critical-banner svg { flex-shrink: 0; margin-top: 2px; }
  .critical-banner b { font-weight: 700; }

  footer {
    margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--line);
    font-size: 12px; color: var(--ink-soft);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
</style>
</head>

const jdContainer = document.getElementById('jdContainer');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.jd-card').forEach((el, i) => {
  setTimeout(() => observer.observe(el), i * 40);
});
</script>
